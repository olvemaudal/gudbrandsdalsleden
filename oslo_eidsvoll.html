"use strict";

// _track is defined above as an array of [lat, lon, elevation] points.
const trackPoints = _track.map(function (p) { return p.slice(); });

// ---- Geo helpers ----
const EARTH_RADIUS_M = 6371000;

function toRad(deg) { return deg * Math.PI / 180; }

function haversine(p1, p2) {
  const dLat = toRad(p2[0] - p1[0]);
  const dLon = toRad(p2[1] - p1[1]);
  const a = Math.sin(dLat / 2) ** 2 +
            Math.cos(toRad(p1[0])) * Math.cos(toRad(p2[0])) * Math.sin(dLon / 2) ** 2;
  return EARTH_RADIUS_M * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

function formatDist(m) {
  return m < 1000 ? m.toFixed(1) + " m" : (m / 1000).toFixed(2) + " km";
}

// ---- Color helpers (elevation gradient, currently unused) ----
function hexToRgb(hex) {
  return [
    parseInt(hex.slice(1, 3), 16),
    parseInt(hex.slice(3, 5), 16),
    parseInt(hex.slice(5, 7), 16),
  ];
}

const ELEV_STOPS = [
  [0,    "#3b82f6"],
  [0.25, "#34d399"],
  [0.5,  "#10b981"],
  [0.75, "#f59e0b"],
  [1,    "#ef4444"],
];

function elevColor(ele, minE, maxE) {
  const t = (ele - minE) / (maxE - minE || 1);
  let i = 0;
  while (i < ELEV_STOPS.length - 1 && ELEV_STOPS[i + 1][0] < t) i++;
  if (i >= ELEV_STOPS.length - 1) return ELEV_STOPS[ELEV_STOPS.length - 1][1];
  const f = (t - ELEV_STOPS[i][0]) / (ELEV_STOPS[i + 1][0] - ELEV_STOPS[i][0]);
  const [r1, g1, b1] = hexToRgb(ELEV_STOPS[i][1]);
  const [r2, g2, b2] = hexToRgb(ELEV_STOPS[i + 1][1]);
  return "rgb(" + Math.round(r1 + f * (r2 - r1)) + "," +
                  Math.round(g1 + f * (g2 - g1)) + "," +
                  Math.round(b1 + f * (b2 - b1)) + ")";
}

// ---- Track statistics ----
function computeStats(points) {
  const cumDist = [0];
  for (let i = 1; i < points.length; i++) {
    cumDist.push(cumDist[i - 1] + haversine(points[i - 1], points[i]));
  }
  const elevs = points.map(function (p) { return p[2]; });
  let gain = 0, loss = 0;
  for (let i = 1; i < points.length; i++) {
    const d = points[i][2] - points[i - 1][2];
    if (d > 0) gain += d; else loss += Math.abs(d);
  }
  return {
    cumDist: cumDist,
    totalDist: cumDist[cumDist.length - 1],
    minEle: Math.min.apply(null, elevs),
    maxEle: Math.max.apply(null, elevs),
    gain: gain,
    loss: loss,
  };
}

const stats = computeStats(trackPoints);

// ---- Info panel UI (top-right, populated on map click) ----
const infoPanel = document.getElementById("info-panel");

function cell(label, value) {
  return '<span class="cell"><i>' + label + '</i>' + value + '</span>';
}

function showInfo(idx, prevIdx) {
  const p = trackPoints[idx];
  let line2 =
    cell("Start", formatDist(stats.cumDist[idx])) +
    cell("End", formatDist(stats.totalDist - stats.cumDist[idx]));
  if (prevIdx != null) {
    const along = Math.abs(stats.cumDist[idx] - stats.cumDist[prevIdx]);
    const straight = haversine(trackPoints[prevIdx], trackPoints[idx]);
    line2 += cell("Path", formatDist(along)) + cell("Dist", formatDist(straight));
  }
  infoPanel.innerHTML =
    '<div class="info-line">' +
      cell("Lat", p[0].toFixed(6)) +
      cell("Lon", p[1].toFixed(6)) +
      cell("Elev", p[2].toFixed(1) + " m") +
    '</div>' +
    '<div class="info-line">' + line2 + '</div>';
  infoPanel.classList.add("visible");
}
// ---- Map rendering ----
function makeDotIcon(color) {
  return L.divIcon({
    html: '<div style="background:' + color + ';width:12px;height:12px;border-radius:50%;border:3px solid #fff"></div>',
    iconSize: [12, 12], iconAnchor: [6, 6], className: ""
  });
}

function drawTrack(map, points) {
  for (let i = 0; i < points.length - 1; i++) {
    L.polyline([[points[i][0], points[i][1]],
                [points[i + 1][0], points[i + 1][1]]],
               { color: "#2563eb", weight: 3, opacity: 0.9 }).addTo(map);
  }
}

function findNearest(points, ll) {
  let bi = 0, bd = Infinity;
  const step = Math.max(1, Math.floor(points.length / 500));
  for (let i = 0; i < points.length; i += step) {
    const d = haversine([ll.lat, ll.lng], points[i]);
    if (d < bd) { bd = d; bi = i; }
  }
  const s = Math.max(0, bi - step);
  const e = Math.min(points.length - 1, bi + step);
  for (let i = s; i <= e; i++) {
    const d = haversine([ll.lat, ll.lng], points[i]);
    if (d < bd) { bd = d; bi = i; }
  }
  return bd < 1000000 ? bi : -1;
}

function initMap() {
  const map = L.map("map", { zoomControl: true });
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    attribution: "\u00a9 OSM", maxZoom: 19
  }).addTo(map);

  // Scale ruler in the bottom-left corner (metric, updates with zoom).
  L.control.scale({ position: "bottomleft", imperial: false, maxWidth: 160 }).addTo(map);

  drawTrack(map, trackPoints);

  const start = trackPoints[0];
  const end = trackPoints[trackPoints.length - 1];

  L.marker([start[0], start[1]], { icon: makeDotIcon("#22c55e") })
    .bindTooltip("Start", { direction: "top", offset: [0, -10] }).addTo(map);
  L.marker([end[0], end[1]], { icon: makeDotIcon("#ef4444") })
    .bindTooltip("End", { direction: "top", offset: [0, -10] }).addTo(map);

  map.fitBounds([[start[0], start[1]], [end[0], end[1]]], { padding: [30, 30] });

  // Markers: previous click stays visible (orange), current click is yellow.
  let currMarker = null, prevMarker = null;
  let lastIdx = null;
  map.on("click", function (e) {
    const idx = findNearest(trackPoints, e.latlng);
    if (idx < 0) return;
    if (lastIdx != null) {
      const lp = trackPoints[lastIdx];
      if (prevMarker) prevMarker.setLatLng([lp[0], lp[1]]);
      else prevMarker = L.marker([lp[0], lp[1]], { icon: makeDotIcon("#f97316") })
        .bindTooltip("Previous", { direction: "top", offset: [0, -10] }).addTo(map);
    }
    const p = trackPoints[idx];
    if (currMarker) currMarker.setLatLng([p[0], p[1]]);
    else currMarker = L.marker([p[0], p[1]], { icon: makeDotIcon("#facc15") })
      .bindTooltip("Selected", { direction: "top", offset: [0, -10] }).addTo(map);
    showInfo(idx, lastIdx);
    lastIdx = idx;
  });

  return map;
}

try {
  initMap();
} catch (err) {
  console.error("ERROR:", err, err.stack);
  document.body.innerHTML = '<div style="padding:20px;color:#f44;font-size:18px;font-family:monospace">Error: ' + err.message + '</div>';
}
