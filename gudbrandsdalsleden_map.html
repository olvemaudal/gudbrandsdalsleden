for (var i = 0; i < _track.length; i++) { trackPoints.push(_track[i].slice(0)); }

function haversine(p1, p2) {
  var R = 6371000;
  var dLat = (p2[0] - p1[0]) * Math.PI / 180;
  var dLon = (p2[1] - p1[1]) * Math.PI / 180;
  var a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
          Math.cos(p1[0] * Math.PI / 180) * Math.cos(p2[0] * Math.PI / 180) * Math.sin(dLon / 2) * Math.sin(dLon / 2);
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

function formatDist(m) {
  return m < 1000 ? m.toFixed(1) + " m" : (m / 1000).toFixed(2) + " km";
}

function elevColor(ele, minE, maxE) {
  var t = (ele - minE) / (maxE - minE || 1);
  var stops = [[0, "#3b82f6"], [0.25, "#34d399"], [0.5, "#10b981"], [0.75, "#f59e0b"], [1, "#ef4444"]];
  var i = 0;
  while (i < stops.length - 1 && stops[i + 1][0] < t) i++;
  if (i >= stops.length - 1) return stops[stops.length - 1][1];
  var f = (t - stops[i][0]) / (stops[i + 1][0] - stops[i][0]);
  var h0 = stops[i][1], h1 = stops[i + 1][1];
  var r1 = parseInt(h0.slice(1, 3), 16), g1 = parseInt(h0.slice(3, 5), 16), b1 = parseInt(h0.slice(5, 7), 16);
  var r2 = parseInt(h1.slice(1, 3), 16), g2 = parseInt(h1.slice(3, 5), 16), b2 = parseInt(h1.slice(5, 7), 16);
  return "rgb(" + Math.round(r1 + f * (r2 - r1)) + "," +
         Math.round(g1 + f * (g2 - g1)) + "," +
         Math.round(b1 + f * (b2 - b1)) + ")";
}

var cumDist = [0];
for (var i = 1; i < trackPoints.length; i++) {
  cumDist.push(cumDist[i - 1] + haversine(trackPoints[i - 1], trackPoints[i]));
}
var totalDist = cumDist[cumDist.length - 1];

var elevs = trackPoints.map(function(p) { return p[2]; });
var minEle = Math.min.apply(null, elevs), maxEle = Math.max.apply(null, elevs);
var gain = 0, loss = 0;
for (var i = 1; i < trackPoints.length; i++) {
  var d = trackPoints[i][2] - trackPoints[i - 1][2];
  if (d > 0) gain += d; else loss += Math.abs(d);
}

function makeStat(label, value) {
  return '<div class="stat"><b>' + label + ':</b> ' + value + '</div>';
}

var statsDiv = document.getElementById("stats-bar");
var _hoverIdx = -1;

function updateHoverStats(idx) {
  if (idx < 0) {
    statsDiv.innerHTML =
      makeStat("Total", formatDist(totalDist)) +
      makeStat("Points", trackPoints.length.toLocaleString()) +
      makeStat("Elev", minEle + " to " + maxEle + " m") +
      makeStat("Gain", "+" + gain.toFixed(0) + " m") +
      makeStat("Loss", loss.toFixed(0) + " m");
    _hoverIdx = -1;
    return;
  }
  _hoverIdx = idx;
  var p = trackPoints[idx];
  statsDiv.innerHTML =
    makeStat("Lat", p[0].toFixed(6)) +
    makeStat("Lon", p[1].toFixed(6)) +
    makeStat("Elev", p[2].toFixed(1) + " m") +
    makeStat("Start", formatDist(cumDist[idx])) +
    makeStat("End", formatDist(totalDist - cumDist[idx]));
}

updateHoverStats(-1);

console.log("Init... trackPoints:", trackPoints.length);
try {
  var map = L.map("map", { zoomControl: true });
  console.log("Map created");
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    attribution: "\u00a9 OSM", maxZoom: 19
  }).addTo(map);
  console.log("Tiles added");

  console.log("Drawing segments...");
  for (var b = 0; b < trackPoints.length - 1; b += 100) {
    var end = Math.min(b + 100, trackPoints.length - 1);
    for (var i = b; i < end; i++) {
      L.polyline([[trackPoints[i][0], trackPoints[i][1]],
                   [trackPoints[i + 1][0], trackPoints[i + 1][1]]],
                 { color: "#2563eb", weight: 3, opacity: 0.9 })
        .addTo(map);
    }
  }
  console.log("Segments drawn");

  var startIcon = L.divIcon({
    html: '<div style="background:#22c55e;width:12px;height:12px;border-radius:50%;border:3px solid #fff"></div>',
    iconSize: [12, 12], iconAnchor: [6, 6], className: ""
  });
  L.marker([trackPoints[0][0], trackPoints[0][1]], { icon: startIcon })
    .bindTooltip("Start", { direction: "top", offset: [0, -10] }).addTo(map);

  var endIcon = L.divIcon({
    html: '<div style="background:#ef4444;width:12px;height:12px;border-radius:50%;border:3px solid #fff"></div>',
    iconSize: [12, 12], iconAnchor: [6, 6], className: ""
  });
  L.marker([trackPoints[trackPoints.length - 1][0], trackPoints[trackPoints.length - 1][1]], { icon: endIcon })
    .bindTooltip("End", { direction: "top", offset: [0, -10] }).addTo(map);

  map.fitBounds([
    [trackPoints[0][0], trackPoints[0][1]],
    [trackPoints[trackPoints.length - 1][0], trackPoints[trackPoints.length - 1][1]]
  ], { padding: [30, 30] });
  console.log("Map ready");

  function findNearest(ll) {
    var bi = 0, bd = Infinity;
    var step = Math.max(1, Math.floor(trackPoints.length / 500));
    for (var i = 0; i < trackPoints.length; i += step) {
      var d = haversine([ll.lat, ll.lng], trackPoints[i]);
      if (d < bd) { bd = d; bi = i; }
    }
    var s = Math.max(0, bi - step), e = Math.min(trackPoints.length - 1, bi + step);
    for (var i = s; i <= e; i++) {
      var d = haversine([ll.lat, ll.lng], trackPoints[i]);
      if (d < bd) { bd = d; bi = i; }
    }
    return bd < 1000000 ? bi : -1;
  }

  map.on("mousemove", function(e) {
    var idx = findNearest(e.latlng);
    updateHoverStats(idx);
  });
  map.on("mouseleave", function() { updateHoverStats(-1); });

  console.log("All done!");
} catch (err) {
  console.error("ERROR:", err, err.stack);
  document.body.innerHTML = '<div style="padding:20px;color:#f44;font-size:18px;font-family:monospace">Error: ' + err.message + '</div>';
